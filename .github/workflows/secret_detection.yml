name: Secret Actionability Detection Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-and-score:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install detect-secrets pandas numpy

    - name: Run Secret Detection (Detection Layer)
      run: |
        detect-secrets scan . > secrets_detected.json
        echo "Detection complete"
        cat secrets_detected.json

    - name: Run Actionability Scoring (Validation Layer)
      run: python framework_scorer.py

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: framework-results
        path: |
          secrets_detected.json
          scoring_results.csv

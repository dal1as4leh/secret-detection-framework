name: Secret Actionability Detection Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-and-score:
    runs-on: ubuntu-latest
    env:
      REMEDIATION_TOKEN: ${{ secrets.REMEDIATION_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install detect-secrets pandas numpy requests pynacl

    - name: Run Secret Detection
      run: detect-secrets scan --no-verify --exclude-files 'framework_scorer.py' --exclude-files '.github/workflows/secret_detection.yml' . > secrets_detected.json || echo '{"results":{}}' > secrets_detected.json

    - name: Run Actionability Scoring
      run: python $GITHUB_WORKSPACE/framework_scorer.py

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: framework-results
        path: |
          secrets_detected.json
          scoring_results.csv

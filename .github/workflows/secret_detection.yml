name: Secret Actionability Detection Framework

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-and-score:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install detect-secrets pandas numpy

    - name: Run Secret Detection
      run: |
        detect-secrets scan --no-verify --exclude-files 'framework_scorer.py' . > secrets_detected.json || echo '{"results":{}}' > secrets_detected.json
    - name: Check Files Exist
      run: ls -la

    - name: Run Actionability Scoring
      run: python $GITHUB_WORKSPACE/framework_scorer.py

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: framework-results
        path: |
          secrets_detected.json
          scoring_results.csv

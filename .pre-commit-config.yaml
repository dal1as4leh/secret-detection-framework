repos:
  - repo: local
    hooks:
      - id: detect-secrets-scan
        name: Detect Secrets (Detection Layer)
        entry: bash -c "python -m detect_secrets scan --no-verify demo_secrets.env test_files/database.py > secrets_detected.json || echo '{\"results\":{}}' > secrets_detected.json"
        language: system
        always_run: true
        pass_filenames: false

      - id: actionability-framework
        name: Actionability Validation Framework
        entry: python framework_scorer.py
        language: python
        always_run: true
        pass_filenames: false
        additional_dependencies: [pandas, numpy, requests, pynacl]
        
